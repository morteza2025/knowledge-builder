services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:?required}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:?required}
      TELEGRAM_LOCAL: "true"
    command:
      - --local
      - --http-port=8081
      - --dir=/var/lib/telegram-bot-api
      - --temp-dir=/var/lib/telegram-bot-api/tmp
    ports:
      - 127.0.0.1:8081:8081
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8081"]
      interval: 10s
      timeout: 3s
      retries: 12

  knowledge-builder-bot:
    build:
      context: ../..
      dockerfile: deploy/telegram/Dockerfile
    restart: unless-stopped
    depends_on:
      telegram-bot-api:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?required}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS:?required}
      TELEGRAM_BOT_API_BASE_URL: http://telegram-bot-api:8081/bot
      TELEGRAM_BOT_API_FILE_URL: http://telegram-bot-api:8081/file/bot
      TELEGRAM_LOCAL_MODE: "true"
    volumes:
      - ../../input:/app/input
      - ../../outputs:/app/outputs
      - ../../workspaces:/app/workspaces
      - ../../logs:/app/logs

volumes:
  telegram-bot-api-data:
